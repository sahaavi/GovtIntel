services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: govintel
      POSTGRES_USER: govintel
      POSTGRES_PASSWORD: govintel
    ports:
      - "5432:5432"
    volumes:
      - govintel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govintel -d govintel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  govintel_postgres_data:
